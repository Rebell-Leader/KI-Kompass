{% extends "base.html" %}

{% block title %}Access Denied - KI Kompass{% endblock %}

{% block content %}
<div class="container">
    <div class="error-page">
        <div class="error-content">
            <h1 class="error-code">403</h1>
            <h2 class="error-title">Access Denied</h2>
            <p class="error-message">
                Sorry, you don't have permission to access this page. 
                Please make sure you're logged in with the correct account.
            </p>
            <div class="error-actions">
                <a href="{{ url_for('pages.index') }}" class="btn btn-primary">Go to Home</a>
                <a href="{{ url_for('auth.login') }}" class="btn btn-secondary">Log In</a>
            </div>
        </div>
    </div>
</div>

<style>
.error-page {
    min-height: 60vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.error-content {
    max-width: 500px;
    padding: 2rem;
}

.error-code {
    font-size: 6rem;
    font-weight: bold;
    color: var(--primary);
    margin: 0;
    line-height: 1;
}

.error-title {
    font-size: 2rem;
    margin: 1rem 0;
    color: var(--text-dark);
}

.error-message {
    font-size: 1.1rem;
    color: var(--text-medium);
    margin-bottom: 2rem;
    line-height: 1.6;
}

.error-actions {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
}

.error-actions .btn {
    min-width: 120px;
}
</style>
{% endblock %}
